// Helpers: build visits object from bool array and date-id array
function mkVisits(bools, dateIds){
  const v={};
  bools.forEach((b,i)=>{ if(dateIds[i]) v[dateIds[i]]=!!b; });
  return v;
}
function mkDates(isoArr){
  const DAYS=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  return isoArr.map((d,i)=>{
    const dt=new Date(d+'T00:00:00');
    return {id:'d'+i, date:d, label:DAYS[dt.getDay()]};
  });
}
function mkSubs(arr){ return arr.map(([name,amount],i)=>({id:'s'+i,name,amount,note:''})); }
function mkVisitors(arr, dateIds){
  return arr.map(([name,visits],i)=>({id:'v'+i, name, visits:mkVisits(visits,dateIds)}));
}

// ─────────────────────── UPLOAD ───────────────────────
const logEl = document.getElementById('log');
function log(msg, cls=''){
  logEl.style.display='';
  const div=document.createElement('div');
  div.className=cls;
  div.innerHTML=msg;
  logEl.appendChild(div);
  logEl.scrollTop=logEl.scrollHeight;
}

document.getElementById('uploadBtn').onclick = async () => {
  if(!uid){ alert('Войди через Google'); return; }
  document.getElementById('uploadBtn').disabled=true;
  log('Начинаем загрузку...','head');

  const userRef = db.collection('dance_users').doc(uid);
  const groupsRef = userRef.collection('groups');
  const monthsRef = userRef.collection('months');

  // Create groups
  const groupIds = {};
  for(const groupName of Object.keys(SEED)){
    const color = groupName==='ХИЛС' ? '#d48fd4' : '#f0a0c0';
    const ref = await groupsRef.add({ name: groupName, color, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    groupIds[groupName] = ref.id;
    log(`✓ Группа "${groupName}" создана`, 'ok');
  }

  // Upload months
  for(const [groupName, months] of Object.entries(SEED)){
    const gid = groupIds[groupName];
    for(const [periodKey, data] of Object.entries(months)){
      const docKey = `${gid}_${periodKey}`;
      const [yr,mo] = periodKey.split('_');
      await monthsRef.doc(docKey).set({
        subscriptions: data.subscriptions,
        trainingDates: data.trainingDates,
        oneTimePrice:  data.oneTimePrice,
        oneTimeVisitors: data.visitors,
        trainer1Pct: 60,
        trainer2Pct: 40,
        rent: 0,
        otherExp: 0,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      const subSum = data.subscriptions.reduce((s,r)=>s+r.amount,0);
      const oneSum = data.visitors.reduce((s,v)=>{
        const cnt = Object.values(v.visits||{}).filter(Boolean).length;
        return s + cnt * data.oneTimePrice;
      },0);
      const MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
      const label = `${MONTHS[Number(mo)-1]} ${yr}`;
      log(`✓ ${groupName} / ${label}: абон ${subSum}₴ + разовые ${oneSum}₴ = ${subSum+oneSum}₴`, 'ok');
    }
  }

  log('','');
  log('🎉 Все данные загружены! Можешь открывать приложение.','head');
  document.getElementById('uploadBtn').textContent='✓ Готово!';
};
</script>
</body>
</html>
